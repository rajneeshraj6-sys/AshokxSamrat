<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Insights</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  width: 90%;
  max-width: 360px;
  padding: 25px;
  border-radius: 25px;
  text-align: center;
  color: white;
  backdrop-filter: blur(20px);
  background: rgba(0, 0, 0, 0.35);
  box-shadow: 0 0 40px rgba(0,255,150,0.4);
}

/* Top tag */
.tag {
  display: inline-block;
  background: rgba(0,255,150,0.2);
  padding: 6px 18px;
  border-radius: 25px;
  margin-bottom: 18px;
  font-size: 13px;
}

/* Profile FIXED CENTER */
.profile {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  display: block;
  margin: 15px auto; /* ✅ center fix */
  border: 3px solid #00ff99;
  object-fit: cover;
  box-shadow: 0 0 15px #00ff99; /* glow effect */
}

/* Name Glow */
.name {
  font-size: 24px;
  font-weight: bold;
  margin: 10px 0;
  text-shadow: 0 0 12px #00ff99;
}

/* Subtitle */
.sub {
  font-size: 13px;
  opacity: 0.8;
  line-height: 1.5;
}

/* Timer */
.timer {
  margin: 18px 0;
  font-size: 15px;
  color: #00ff99;
  font-weight: bold;
}

/* Button Glow */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 35px;
  background: linear-gradient(45deg, #00ff99, #00cc77);
  color: black;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from {
    box-shadow: 0 0 10px #00ff99;
  }
  to {
    box-shadow: 0 0 30px #00ff99;
  }
}

/* Footer text */
.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
  line-height: 1.4;
}

/* Mobile perfect spacing */
@media (max-width: 400px) {
  .card {
    padding: 20px;
  }
  .name {
    font-size: 22px;
  }
}

</style>

  <div class="sub">Honest analysis • Match insights • Community driven</div>

  <div class="timer">
    FREE JOINING ENDS IN <span id="count">60</span>s
  </div>

  <button class="btn" onclick="join()">Subscribe Free 🚀</button>

    counter.innerText = time;
